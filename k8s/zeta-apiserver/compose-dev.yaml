services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres:/data/postgres

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"

  registry:
    image: registry:3
    ports:
      - 5000:5000
    restart: always
    volumes:
      - registry:/var/lib/registry

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z.hotfix.7aa24e772
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - minio:/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  minio:
  postgres:
  registry:
