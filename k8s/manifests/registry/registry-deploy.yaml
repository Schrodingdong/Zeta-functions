apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: zeta
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      name: registry
      labels:
        app: registry
    spec:
      volumes:
        - name: registry-pvc
          persistentVolumeClaim:
            claimName: registry-pvc
        - name: tls
          secret:
            secretName: registry-tls
      containers:
        - name: registry
          image: registry:3
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - mountPath: /var/lib/registry
              name: registry-pvc
            - name: tls
              mountPath: /certs
              readOnly: true
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
      restartPolicy: Always
      