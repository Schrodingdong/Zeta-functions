apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zeta-role
  namespace: zeta
rules:
  - apiGroups: [ "" ]
    resources: [ "services" ]
    verbs: ["create", "delete", "list", "get"]
  - apiGroups: [ "autoscaling" ]
    resources: [ "horizontalpodautoscalers" ]
    verbs: ["create", "delete", "list", "get"]
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    verbs: ["create", "delete", "list", "get"]