name: Build and push container images to GHCR
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: zeta-apiserver
            context: ./k8s/zeta-apiserver

          - name: zeta-base-runner-python
            context: ./k8s/zeta-base-runners/python/base-runner

          - name: zeta-runner
            context: ./k8s/zeta-runner

          - name: zeta-image-engine
            context: ./k8s/zeta-image-engine
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ${{ matrix.image.context }}
          tags: ghcr.io/${{ vars.GHCR_USERNAME }}/${{ matrix.image.name }}:latest
